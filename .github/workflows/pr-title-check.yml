name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  check-pr-title:
    name: Validate PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title has ticket prefix
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if ! echo "$TITLE" | grep -qE '^\[[A-Za-z0-9-]+\]\s'; then
            echo "::error::PR title \"$TITLE\" does not match the required format."
            echo "Expected: [TICKET-ID] type: description"
            echo "Examples:"
            echo "  - [AS-123] feat: add login page"
            echo "  - [NO-TICKET] fix: resolve crash"
            echo "A ticket prefix like [AS-XXX] or [NO-TICKET] is required."
            exit 1
          fi
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          headerPattern: '^\[[\w-]+\]\s(\w+)(?:\(([\w-]+)\))?!?:\s(.+)$'
          headerPatternCorrespondence: type, scope, subject
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must not have an empty description after the type/scope prefix."